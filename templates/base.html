<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Petrodactal Monitor{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Simple, dependency-free styling (easy to replace later). */
    :root { --bg:#0b1220; --card:#101a2e; --text:#e6edf3; --muted:#9fb0c0; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b; --border:#1f2a44; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    header { padding: 18px 22px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .brand { font-weight: 700; letter-spacing: .3px; }
    .sub { color: var(--muted); font-size: 14px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 18px 22px 40px; }
    .grid { display:grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card { background: var(--card); border:1px solid var(--border); border-radius: 16px; padding: 14px; box-shadow: 0 8px 22px rgba(0,0,0,.25); }
    .row { display:flex; align-items:center; justify-content:space-between; gap: 10px; }
    .pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; border:1px solid var(--border); color: var(--muted); }
    .status { font-weight: 700; }
    .ok { color: var(--good); }
    .down { color: var(--bad); }
    .unknown { color: var(--warn); }
    .tiny { font-size: 12px; color: var(--muted); margin-top: 8px; }
    footer { color: var(--muted); padding: 18px 22px; border-top: 1px solid var(--border); }
    code { background: rgba(255,255,255,.06); padding: 2px 6px; border-radius: 8px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div>
      <div class="brand"><a href="/">Petrodactal Monitor</a></div>
      <div class="sub">{% block subtitle %}Game server status panel{% endblock %}</div>
    </div>
    <div class="pill">Updated: {% if last_poll %}{{ last_poll|date:"Y-m-d H:i:s" }} UTC{% else %}Never{% endif %}</div>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>
    Admin: <code>/admin</code> • API: <code>/api/v1</code>
  </footer>
</body>
</html>
