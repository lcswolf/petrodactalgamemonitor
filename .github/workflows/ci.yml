name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: pip install -r requirements.txt pytest pytest-django ruff
    - name: Lint
      run: ruff check .
    - name: Test
      run: python manage.py test --settings=petrodactal.settings_test