# /etc/nginx/sites-available/monitor.cymru-hosting.co.uk
server {
    listen 80;
    server_name monitor.cymru-hosting.co.uk;

    # If you add TLS with certbot, you'll get a separate server {} for 443.

    # Static files (collected into staticfiles/)
    location /static/ {
        alias /opt/petrodactalgamemonitor/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
