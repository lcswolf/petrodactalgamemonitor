services:
  - type: web
    name: petrodactal-monitor
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn petrodactal.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEMO_MODE
        value: "True"
    healthCheckPath: /health/
    autoDeploy: true